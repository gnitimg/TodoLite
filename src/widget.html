<!doctype html>
<html>
<head>
  <meta charset="UTF-8" />
  <link rel="stylesheet" href="shared.css" />
  <link rel="stylesheet" href="widget.css" />
</head>
<body>
  <main class="widget glass drag">
    <header>
      <div class="title">TodoLite</div>
      <div class="hint">quiet list</div>
    </header>
    <section id="list" class="list no-drag"></section>
    <footer class="no-drag">
      <button id="addBtn" title="Add">＋</button>
      <button id="sortBtn" title="Sort by DDL">⇅</button>
    </footer>
  </main>
  <dialog id="editor" class="glass no-drag">
    <form method="dialog" id="form">
      <input id="content" placeholder="content" autocomplete="off" />
      <input id="ddl" type="datetime-local" step="1" />
      <textarea id="detail" placeholder="detail, optional"></textarea>
      <div class="dialog-actions">
        <button value="cancel" type="button" id="cancelBtn">cancel</button>
        <button value="ok" type="submit">save</button>
      </div>
    </form>
  </dialog>
  <script src="widget.js"></script>
</body>
</html>
