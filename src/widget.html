<!doctype html>
<html>
<head>
  <meta charset="UTF-8" />
  <link rel="stylesheet" href="shared.css" />
  <link rel="stylesheet" href="widget.css" />
  <link rel="stylesheet" href="motion_patch.css" />
</head>
<body>
  <main class="widget glass drag">
    <header class="drag">
      <div class="title">TodoLite</div>
      <div class="hint" data-i18n="taskList">任务列表</div>
    </header>

    <section id="list" class="list no-drag"></section>

    <footer class="no-drag">
      <button id="addBtn" title="Add">＋</button>
      <button id="sortBtn" title="Sort by DDL">⇅</button>
    </footer>
  </main>

  <dialog id="editor" class="glass no-drag">
    <form method="dialog" id="form">
      <input id="content" placeholder="内容" autocomplete="off" />
      <input id="ddl" class="ddl-picker-input" placeholder="DDL" readonly />
      <textarea id="detail" placeholder="详情，可选"></textarea>

      <div class="dialog-actions">
        <button value="cancel" type="button" id="cancelBtn" data-i18n="cancel">取消</button>
        <button value="ok" type="submit" data-i18n="save">保存</button>
      </div>
    </form>
  </dialog>

  <script src="shared.js"></script>
  <script src="widget.js"></script>
  <script src="motion_patch.js"></script>
</body>
</html>
